<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Base App Window -->
    <rect x="40" y="40" width="320" height="240" rx="16" fill="#1e1e2f" stroke="url(#grad1)" stroke-width="4"/>
    
    <!-- Window Controls -->
    <circle cx="70" cy="70" r="6" fill="#ef4444"/>
    <circle cx="90" cy="70" r="6" fill="#eab308"/>
    <circle cx="110" cy="70" r="6" fill="#22c55e"/>
    
    <!-- Code Lines -->
    <rect x="70" y="110" width="120" height="12" rx="6" fill="#8b5cf6" opacity="0.9"/>
    
    <!-- Indented lines -->
    <rect x="90" y="140" width="220" height="12" rx="6" fill="#3b82f6" opacity="0.6"/>
    <rect x="90" y="170" width="180" height="12" rx="6" fill="#3b82f6" opacity="0.6"/>
    <rect x="90" y="200" width="150" height="12" rx="6" fill="#10b981" opacity="0.9"/>
    
    <rect x="70" y="230" width="90" height="12" rx="6" fill="#8b5cf6" opacity="0.9"/>
  </g>
</svg>
